<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Artivo</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --bg2: #1a1d23; --bg3: #252830;
      --border: #2e323a; --text: #e2e8f0; --muted: #94a3b8;
      --primary: #6366f1; --primary-h: #4f52c9;
      --danger: #ef4444; --success: #10b981;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg3); color: var(--text);
      font-size: 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--primary); }
    .group { margin-bottom: 20px; }
    .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 24px; cursor: pointer; }
    .remember input { width: 16px; height: 16px; accent-color: var(--primary); }
    .btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn:hover { background: var(--primary-h); }
    .alert { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; background: #ef444420; border: 1px solid #ef4444; color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:24px;">
      <img src="/static/images/logo.svg" alt="Artivo" style="width:52px;height:52px;">
      <div style="text-align:center;">
        <h1 style="margin-bottom:2px;">Artivo</h1>
        <p class="sub" style="margin-bottom:0;">担当企業のブログ・SNS を管理</p>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="designer@example.com">
      </div>
      <div class="group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <label class="remember">
        <input type="checkbox" name="remember"> ログイン状態を保持
      </label>
      <button type="submit" class="btn">ログイン</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted);">
      アカウントをお持ちでない方は
      <a href="{{ url_for('designer.register') }}" style="color:var(--primary);text-decoration:none;">新規登録</a>
    </p>
  </div>
</body>
</html>
