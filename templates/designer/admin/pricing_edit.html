{% extends "designer/base.html" %}
{% block title %}{% if plan %}料金プラン編集{% else %}料金プラン追加{% endif %}{% endblock %}
{% block page_title %}{% if plan %}料金プラン編集{% else %}料金プラン追加{% endif %}{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;">
  <div class="card-body">
    <form method="post">
      <div class="form-group">
        <label>プラットフォーム</label>
        <select name="platform_type" class="form-control" required>
          {% for pt, label in platform_labels.items() %}
          <option value="{{ pt }}" {% if plan and plan.platform_type == pt %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>月間投稿数</label>
        <input type="number" name="monthly_posts" class="form-control" min="1" max="100" value="{{ plan.monthly_posts if plan else 4 }}" required>
      </div>
      <div class="form-group">
        <label>月額料金（円）</label>
        <input type="number" name="monthly_fee" class="form-control" min="0" value="{{ plan.monthly_fee if plan else 0 }}" required>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px;">
        <button type="submit" class="btn btn-primary">{% if plan %}更新{% else %}追加{% endif %}</button>
        <a href="{{ url_for('designer.admin_pricing') }}" class="btn btn-secondary">キャンセル</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
